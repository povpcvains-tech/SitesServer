<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор</title>
    <style>
        /* CSS: Стили и внешний вид */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #222; /* Темный фон страницы */
            margin: 0;
        }

        .calculator {
            background-color: #333;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 320px;
        }

        #display {
            width: 100%;
            height: 60px;
            background-color: #eee;
            border: none;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 2rem;
            text-align: right;
            padding: 10px;
            box-sizing: border-box; /* Чтобы padding не увеличивал ширину */
            color: #333;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4 колонки */
            gap: 10px;
        }

        button {
            padding: 20px;
            font-size: 1.2rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
            color: white;
            background-color: #444;
        }

        button:hover {
            background-color: #555;
        }

        button:active {
            transform: scale(0.98);
        }

        /* Особые стили для операторов */
        .operator {
            background-color: #ff9f43; /* Оранжевый цвет */
        }
        .operator:hover {
            background-color: #e58e3c;
        }

        /* Кнопка Равно */
        .equal {
            background-color: #2ecc71; /* Зеленый цвет */
            grid-column: span 2; /* Занимает 2 ячейки */
        }
        .equal:hover {
            background-color: #27ae60;
        }

        /* Кнопка Очистить */
        .clear {
            background-color: #e74c3c; /* Красный цвет */
        }
        .clear:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>

    <div class="calculator">
        <!-- Экран калькулятора -->
        <input type="text" id="display" readonly>
        
        <!-- Кнопки -->
        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button onclick="deleteLast()">DEL</button>
            <button class="operator" onclick="appendToDisplay('/')">/</button>
            <button class="operator" onclick="appendToDisplay('*')">×</button>
            
            <button onclick="appendToDisplay('7')">7</button>
            <button onclick="appendToDisplay('8')">8</button>
            <button onclick="appendToDisplay('9')">9</button>
            <button class="operator" onclick="appendToDisplay('-')">-</button>
            
            <button onclick="appendToDisplay('4')">4</button>
            <button onclick="appendToDisplay('5')">5</button>
            <button onclick="appendToDisplay('6')">6</button>
            <button class="operator" onclick="appendToDisplay('+')">+</button>
            
            <button onclick="appendToDisplay('1')">1</button>
            <button onclick="appendToDisplay('2')">2</button>
            <button onclick="appendToDisplay('3')">3</button>
            <button onclick="appendToDisplay('.')">.</button>

            <button onclick="appendToDisplay('0')">0</button>
            <button onclick="appendToDisplay('00')">00</button>
            <button class="equal" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        // JavaScript: Логика работы
        const display = document.getElementById('display');

        // Добавить символ на экран
        function appendToDisplay(input) {
            display.value += input;
        }

        // Полная очистка экрана (C)
        function clearDisplay() {
            display.value = "";
        }

        // Удалить последний символ (DEL)
        function deleteLast() {
            display.value = display.value.slice(0, -1);
        }

        // Вычислить результат (=)
        function calculate() {
            try {
                // Функция eval() выполняет математическое выражение в строке
                display.value = eval(display.value);
            } catch (error) {
                display.value = "Ошибка";
            }
        }
    </script>
</body>
</html>
