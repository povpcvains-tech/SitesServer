<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Анонимные чат-комнаты</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0b141a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #app {
            width: 100%;
            max-width: 500px;
            min-height: 100vh;
            background-color: #0b141a;
            color: #e9edef;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* Экран настроек GitHub */
        .screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 24px;
            background-color: #0b141a;
        }

        .screen h2 {
            margin-bottom: 24px;
            text-align: center;
            color: #00a884;
            font-size: 24px;
        }

        .screen input {
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            background-color: #1f2c34;
            border: 1px solid #2a3942;
            color: #e9edef;
            border-radius: 10px;
            font-size: 16px;
        }

        .screen input:focus {
            outline: none;
            border-color: #00a884;
        }

        .screen button {
            width: 100%;
            padding: 14px;
            background-color: #00a884;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
            margin-top: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .screen button:hover {
            background-color: #008f72;
        }

        .screen button:disabled {
            background-color: #2a3942;
            cursor: not-allowed;
        }

        .error-message {
            color: #f15c6d;
            text-align: center;
            margin-top: 12px;
            font-size: 14px;
            min-height: 20px;
        }

        .success-message {
            color: #00a884;
            text-align: center;
            margin-top: 12px;
            font-size: 14px;
        }

        .info-text {
            color: #8696a0;
            font-size: 14px;
            margin-bottom: 20px;
            text-align: center;
        }

        /* Экран входа в комнату */
        .room-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .room-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .room-header h1 {
            color: #00a884;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .room-header p {
            color: #8696a0;
            font-size: 14px;
        }

        .room-input-group {
            margin-bottom: 16px;
        }

        .room-input-group label {
            display: block;
            margin-bottom: 6px;
            color: #8696a0;
            font-size: 14px;
        }

        .back-button {
            background-color: transparent !important;
            color: #00a884 !important;
            border: 1px solid #00a884 !important;
            margin-top: 20px !important;
        }

        .back-button:hover {
            background-color: rgba(0, 168, 132, 0.1) !important;
        }

        /* Экран чата */
        .chat-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: #0b141a;
        }

        .chat-header {
            padding: 16px;
            background-color: #1f2c34;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a3942;
        }

        .chat-header .room-info {
            display: flex;
            flex-direction: column;
        }

        .chat-header .room-name {
            font-size: 16px;
            color: #e9edef;
            font-weight: bold;
        }

        .chat-header .room-participants {
            font-size: 12px;
            color: #8696a0;
        }

        .chat-header button {
            background-color: #2a3942;
            color: #e9edef;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            width: auto;
            margin: 0;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background-color: #0b141a;
        }

        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 18px;
            word-wrap: break-word;
            font-size: 15px;
            line-height: 1.4;
            cursor: pointer;
        }

        .message.own {
            align-self: flex-end;
            background-color: #005d4b;
            color: #e9edef;
            border-bottom-right-radius: 4px;
        }

        .message.other {
            align-self: flex-start;
            background-color: #1f2c34;
            color: #e9edef;
            border-bottom-left-radius: 4px;
        }

        .message.encrypted {
            background-color: #2a3942;
            border: 1px dashed #00a884;
        }

        .message-image {
            max-width: 200px;
            max-height: 300px;
            border-radius: 12px;
            cursor: pointer;
            margin: 4px 0;
        }

        .audio-message {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px;
            background-color: #1f2c34;
            border-radius: 25px;
            min-width: 200px;
        }

        .audio-play-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #00a884;
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .audio-wave {
            flex: 1;
            height: 30px;
            background: linear-gradient(90deg, #00a884 0%, #2a3942 100%);
            border-radius: 15px;
            opacity: 0.5;
        }

        .audio-duration {
            color: #8696a0;
            font-size: 12px;
        }

        .recording-indicator {
            color: #f15c6d;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .recording-dot {
            width: 10px;
            height: 10px;
            background-color: #f15c6d;
            border-radius: 50%;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        .message-time {
            font-size: 11px;
            color: #8696a0;
            margin-top: 4px;
            text-align: right;
        }

        .message-sender {
            font-size: 12px;
            color: #00a884;
            margin-bottom: 2px;
            font-weight: bold;
        }

        .input-area {
            padding: 12px;
            background-color: #1f2c34;
            display: flex;
            flex-direction: column;
            gap: 8px;
            border-top: 1px solid #2a3942;
        }

        .input-row {
            display: flex;
            width: 100%;
            gap: 8px;
            align-items: center;
        }

        .input-area input {
            flex: 1;
            padding: 14px;
            background-color: #2a3942;
            border: 1px solid #3b4a54;
            color: #e9edef;
            border-radius: 25px;
            font-size: 16px;
            margin-bottom: 0;
        }

        .input-area input:focus {
            outline: none;
            border-color: #00a884;
        }

        .action-btn {
            background-color: #2a3942 !important;
            color: #e9edef !important;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 0;
        }

        .send-btn {
            background-color: #00a884;
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 0;
        }

        .send-btn:disabled, .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .hidden {
            display: none !important;
        }

        #image-preview {
            max-width: 100%;
            max-height: 100px;
            border-radius: 8px;
        }

        .preview-container {
            position: relative;
            display: inline-block;
            margin: 4px 0;
        }

        .remove-preview {
            position: absolute;
            top: -8px;
            right: -8px;
            background-color: #f15c6d;
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        /* Модальное окно дешифратора */
        .decrypt-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0,0,0,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
        }

        .decrypt-container {
            background-color: #1f2c34;
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .decrypt-container h3 {
            color: #00a884;
            margin-bottom: 16px;
            font-size: 20px;
        }

        .decrypt-container input {
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            background-color: #2a3942;
            border: 1px solid #3b4a54;
            color: #e9edef;
            border-radius: 10px;
            font-size: 16px;
        }

        .decrypt-container button {
            width: 100%;
            padding: 14px;
            background-color: #00a884;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
            margin-top: 8px;
            cursor: pointer;
        }

        .decrypt-result {
            margin-top: 20px;
            padding: 16px;
            background-color: #2a3942;
            border-radius: 10px;
            max-height: 300px;
            overflow-y: auto;
        }

        .decrypt-result img {
            max-width: 100%;
            border-radius: 8px;
        }

        .decrypt-result audio {
            width: 100%;
            margin-top: 8px;
        }

        .decrypt-result .text-message {
            color: #e9edef;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .close-modal {
            background-color: transparent !important;
            color: #f15c6d !important;
            border: 1px solid #f15c6d !important;
            margin-top: 8px;
        }

        .modal-image {
            max-width: 100%;
            max-height: 70vh;
            object-fit: contain;
        }

        .recording-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            background-color: #2a3942;
            border-radius: 25px;
        }
    </style>
    <!-- Подключаем CryptoJS для AES-256 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body>
    <div id="app">
        <!-- Экран 1: Ввод GitHub токена и Gist ID -->
        <div id="settings-screen" class="screen">
            <h2>⚙️ Настройки GitHub</h2>
            <div class="info-text">Введите данные для доступа к Gist</div>
            <input type="text" id="github-token" placeholder="GitHub Personal Access Token" value="">
            <input type="text" id="gist-id" placeholder="Gist ID" value="">
            <button id="save-settings-btn">Продолжить</button>
            <div id="settings-error" class="error-message"></div>
            <div id="settings-success" class="success-message"></div>
        </div>

        <!-- Экран 2: Вход в комнату -->
        <div id="room-screen" class="screen hidden">
            <div class="room-container">
                <div class="room-header">
                    <h1>🔐 Чат-комнаты</h1>
                    <p>Введите пароль комнаты чтобы присоединиться</p>
                </div>
                
                <div class="room-input-group">
                    <label>Ваше имя</label>
                    <input type="text" id="username" placeholder="Как вас называть?" autocomplete="off">
                </div>
                
                <div class="room-input-group">
                    <label>Пароль комнаты</label>
                    <input type="password" id="room-password" placeholder="Пароль для входа в комнату" autocomplete="off">
                </div>
                
                <button id="join-room-btn">🔑 Войти в комнату</button>
                <button id="back-to-settings" class="back-button">← Назад к настройкам</button>
                <div id="room-error" class="error-message"></div>
            </div>
        </div>

        <!-- Экран 3: Чат -->
        <div id="chat-screen" class="chat-screen hidden">
            <div class="chat-header">
                <div class="room-info">
                    <span class="room-name" id="current-room">Комната</span>
                    <span class="room-participants" id="room-participants">Участников: 0</span>
                </div>
                <button id="logout-btn">Выйти</button>
            </div>
            
            <div id="messages" class="messages-container"></div>
            
            <div class="input-area">
                <!-- Превью изображения -->
                <div id="preview-container" class="preview-container hidden">
                    <img id="image-preview" src="" alt="Preview">
                    <button id="remove-preview" class="remove-preview">×</button>
                </div>

                <!-- Индикатор записи -->
                <div id="recording-indicator" class="recording-indicator hidden">
                    <span class="recording-dot"></span>
                    <span>Запись... <span id="recording-timer">0</span>с</span>
                    <button id="stop-recording" class="action-btn" style="width: 30px; height: 30px;">⏹️</button>
                </div>
                
                <div class="input-row">
                    <input type="text" id="message-input" placeholder="Сообщение в комнату" autocomplete="off">
                    <input type="file" id="image-upload" accept="image/*" style="display: none">
                    <button id="attach-btn" class="action-btn">📷</button>
                    <button id="voice-btn" class="action-btn">🎤</button>
                    <button id="send-btn" class="send-btn">➤</button>
                </div>
            </div>
        </div>

        <!-- Модальное окно дешифратора -->
        <div id="decrypt-modal" class="decrypt-modal hidden">
            <div class="decrypt-container">
                <h3>🔐 Дешифратор сообщений</h3>
                <p style="color:#8696a0; margin-bottom:16px;">Введите пароль комнаты для просмотра</p>
                <input type="password" id="decrypt-password" placeholder="Пароль комнаты">
                <button id="decrypt-btn">Расшифровать</button>
                <button id="close-decrypt-modal" class="close-modal">Закрыть</button>
                <div id="decrypt-result" class="decrypt-result hidden"></div>
            </div>
        </div>
    </div>

    <script>
        // Константы для GitHub
        let GITHUB_TOKEN = '';
        let GIST_ID = '';

        // Переменные состояния
        let currentUser = '';
        let roomPassword = ''; // Пароль комнаты (он же ключ шифрования)
        let messages = [];
        let pollingInterval = null;
        let selectedImage = null;
        let selectedAudio = null;
        let currentEncryptedMessage = null;

        // Переменные для аудио
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let recordingTimer = null;
        let recordingSeconds = 0;

        // DOM элементы
        const settingsScreen = document.getElementById('settings-screen');
        const roomScreen = document.getElementById('room-screen');
        const chatScreen = document.getElementById('chat-screen');
        const decryptModal = document.getElementById('decrypt-modal');
        
        const tokenInput = document.getElementById('github-token');
        const gistIdInput = document.getElementById('gist-id');
        const saveSettingsBtn = document.getElementById('save-settings-btn');
        const settingsError = document.getElementById('settings-error');
        const settingsSuccess = document.getElementById('settings-success');
        
        const usernameInput = document.getElementById('username');
        const roomPasswordInput = document.getElementById('room-password');
        const joinRoomBtn = document.getElementById('join-room-btn');
        const roomError = document.getElementById('room-error');
        const backToSettingsBtn = document.getElementById('back-to-settings');
        
        const currentRoomSpan = document.getElementById('current-room');
        const roomParticipantsSpan = document.getElementById('room-participants');
        const messagesContainer = document.getElementById('messages');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const attachBtn = document.getElementById('attach-btn');
        const voiceBtn = document.getElementById('voice-btn');
        const imageUpload = document.getElementById('image-upload');
        const previewContainer = document.getElementById('preview-container');
        const imagePreview = document.getElementById('image-preview');
        const removePreviewBtn = document.getElementById('remove-preview');
        const recordingIndicator = document.getElementById('recording-indicator');
        const recordingTimerSpan = document.getElementById('recording-timer');
        const stopRecordingBtn = document.getElementById('stop-recording');

        // Элементы дешифратора
        const decryptPassword = document.getElementById('decrypt-password');
        const decryptBtn = document.getElementById('decrypt-btn');
        const closeDecryptModal = document.getElementById('close-decrypt-modal');
        const decryptResult = document.getElementById('decrypt-result');

        // Загружаем сохраненные настройки
        function loadSavedSettings() {
            const savedToken = localStorage.getItem('github_token');
            const savedGistId = localStorage.getItem('gist_id');
            if (savedToken) tokenInput.value = savedToken;
            if (savedGistId) gistIdInput.value = savedGistId;
        }

        // Проверка Gist
        async function validateGistSettings(token, gistId) {
            const url = `https://api.github.com/gists/${gistId}?_=${Date.now()}`;
            const response = await fetch(url, {
                headers: {
                    'Authorization': `token ${token}`,
                    'Accept': 'application/vnd.github.v3+json'
                }
            });

            if (!response.ok) {
                throw new Error(`Ошибка ${response.status}: ${response.statusText}`);
            }

            return await response.json();
        }

        // Сохранение настроек
        saveSettingsBtn.addEventListener('click', async () => {
            const token = tokenInput.value.trim();
            const gistId = gistIdInput.value.trim();
            
            if (!token || !gistId) {
                settingsError.textContent = 'Введите токен и Gist ID';
                return;
            }

            saveSettingsBtn.disabled = true;
            saveSettingsBtn.textContent = 'Проверка...';

            try {
                await validateGistSettings(token, gistId);
                
                GITHUB_TOKEN = token;
                GIST_ID = gistId;
                localStorage.setItem('github_token', token);
                localStorage.setItem('gist_id', gistId);
                
                settingsSuccess.textContent = '✓ Настройки сохранены';
                
                setTimeout(() => {
                    settingsScreen.classList.add('hidden');
                    roomScreen.classList.remove('hidden');
                }, 500);
                
            } catch (error) {
                settingsError.textContent = 'Ошибка: ' + error.message;
            } finally {
                saveSettingsBtn.disabled = false;
                saveSettingsBtn.textContent = 'Продолжить';
            }
        });

        // Возврат к настройкам
        backToSettingsBtn.addEventListener('click', () => {
            roomScreen.classList.add('hidden');
            settingsScreen.classList.remove('hidden');
            resetRoomForm();
        });

        function resetRoomForm() {
            roomError.textContent = '';
            usernameInput.value = '';
            roomPasswordInput.value = '';
        }

        // Прикрепление фото
        attachBtn.addEventListener('click', () => {
            imageUpload.click();
        });

        imageUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    selectedImage = event.target.result;
                    imagePreview.src = selectedImage;
                    previewContainer.classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        });

        removePreviewBtn.addEventListener('click', () => {
            selectedImage = null;
            previewContainer.classList.add('hidden');
            imageUpload.value = '';
        });

        // Запись голоса
        voiceBtn.addEventListener('click', async () => {
            if (isRecording) return;

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = (event) => {
                    audioChunks.push(event.data);
                };

                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.onload = () => {
                        selectedAudio = reader.result;
                        sendAudioMessage(reader.result);
                    };
                    reader.readAsDataURL(audioBlob);
                    
                    stream.getTracks().forEach(track => track.stop());
                };

                mediaRecorder.start();
                isRecording = true;
                recordingSeconds = 0;
                recordingIndicator.classList.remove('hidden');
                voiceBtn.disabled = true;
                attachBtn.disabled = true;
                sendBtn.disabled = true;

                recordingTimer = setInterval(() => {
                    recordingSeconds++;
                    recordingTimerSpan.textContent = recordingSeconds;
                }, 1000);

            } catch (error) {
                alert('Ошибка доступа к микрофону: ' + error.message);
            }
        });

        stopRecordingBtn.addEventListener('click', () => {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                clearInterval(recordingTimer);
                recordingIndicator.classList.add('hidden');
                voiceBtn.disabled = false;
                attachBtn.disabled = false;
                sendBtn.disabled = false;
            }
        });

        // Отправка аудио
        async function sendAudioMessage(audioData) {
            sendBtn.disabled = true;
            attachBtn.disabled = true;
            voiceBtn.disabled = true;
            messageInput.disabled = true;

            try {
                await sendMessage('', null, audioData);
                await refreshMessages();
            } catch (error) {
                alert('Ошибка отправки аудио: ' + error.message);
            } finally {
                sendBtn.disabled = false;
                attachBtn.disabled = false;
                voiceBtn.disabled = false;
                messageInput.disabled = false;
                messageInput.focus();
                selectedAudio = null;
            }
        }

        // Работа с Gist
        async function getGistContent() {
            const url = `https://api.github.com/gists/${GIST_ID}?_=${Date.now()}`;
            const response = await fetch(url, {
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Accept': 'application/vnd.github.v3+json'
                }
            });

            if (!response.ok) throw new Error(`Ошибка загрузки: ${response.status}`);
            return await response.json();
        }

        async function updateGistContent(encryptedMessages) {
            const gistData = await getGistContent();
            const filename = Object.keys(gistData.files)[0];
            
            const updateData = {
                files: {
                    [filename]: {
                        content: JSON.stringify(encryptedMessages, null, 2)
                    }
                }
            };

            const response = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                method: 'PATCH',
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(updateData)
            });

            if (!response.ok) throw new Error(`Ошибка обновления: ${response.status}`);
            return await response.json();
        }

        // Шифрование/дешифрование
        function encryptMessage(text, passphrase) {
            return CryptoJS.AES.encrypt(text, passphrase).toString();
        }

        function decryptMessage(encryptedText, passphrase) {
            try {
                const bytes = CryptoJS.AES.decrypt(encryptedText, passphrase);
                const decrypted = bytes.toString(CryptoJS.enc.Utf8);
                return decrypted || null;
            } catch (e) {
                return null;
            }
        }

        // Загрузка сообщений
        async function loadMessages() {
            try {
                const gistData = await getGistContent();
                const filename = Object.keys(gistData.files)[0];
                const content = gistData.files[filename].content;
                
                let encryptedMessages = [];
                
                if (content && content.trim()) {
                    try {
                        const parsed = JSON.parse(content);
                        if (Array.isArray(parsed)) {
                            encryptedMessages = parsed;
                        }
                    } catch (e) {}
                }

                // Дешифруем с паролем комнаты
                const decryptedMessages = [];
                const uniqueUsers = new Set();
                
                for (const msg of encryptedMessages) {
                    if (!msg || !msg.text) continue;
                    
                    const decryptedText = decryptMessage(msg.text, roomPassword);
                    if (decryptedText !== null) {
                        // Успешно расшифровано
                        uniqueUsers.add(msg.user);
                        
                        if (decryptedText.startsWith('data:image')) {
                            decryptedMessages.push({
                                ...msg,
                                type: 'image',
                                imageData: decryptedText,
                                caption: msg.caption,
                                decrypted: true
                            });
                        } else if (decryptedText.startsWith('data:audio')) {
                            decryptedMessages.push({
                                ...msg,
                                type: 'audio',
                                audioData: decryptedText,
                                duration: msg.duration || 0,
                                decrypted: true
                            });
                        } else {
                            decryptedMessages.push({
                                ...msg,
                                type: 'text',
                                text: decryptedText,
                                decrypted: true
                            });
                        }
                    } else {
                        // Не удалось расшифровать (другой пароль комнаты)
                        decryptedMessages.push({
                            ...msg,
                            type: 'encrypted',
                            text: '🔒 Сообщение из другой комнаты',
                            encrypted: true,
                            encryptedData: msg.text,
                            originalUser: msg.user
                        });
                    }
                }

                // Обновляем счетчик участников
                roomParticipantsSpan.textContent = `Участников: ${uniqueUsers.size}`;
                
                return decryptedMessages.sort((a, b) => a.timestamp - b.timestamp);
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                throw error;
            }
        }

        // Отправка сообщения
        async function sendMessage(text, imageData = null, audioData = null) {
            try {
                const gistData = await getGistContent();
                const filename = Object.keys(gistData.files)[0];
                const content = gistData.files[filename].content;
                
                let encryptedMessages = [];
                
                if (content && content.trim()) {
                    try {
                        const parsed = JSON.parse(content);
                        if (Array.isArray(parsed)) {
                            encryptedMessages = parsed;
                        }
                    } catch (e) {}
                }

                // Создаем сообщение
                const newMessage = {
                    id: Date.now() + Math.random().toString(36).substr(2, 9),
                    user: currentUser,
                    time: new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' }),
                    timestamp: Date.now()
                };

                if (imageData) {
                    newMessage.text = encryptMessage(imageData, roomPassword);
                    newMessage.caption = text || '📷 Фото';
                } else if (audioData) {
                    newMessage.text = encryptMessage(audioData, roomPassword);
                    newMessage.duration = recordingSeconds;
                } else {
                    newMessage.text = encryptMessage(text, roomPassword);
                }

                encryptedMessages.push(newMessage);
                await updateGistContent(encryptedMessages);
                return true;
            } catch (error) {
                console.error('Ошибка отправки:', error);
                throw error;
            }
        }

        // Отрисовка сообщений
        function renderMessages() {
            messagesContainer.innerHTML = '';
            
            if (messages.length === 0) {
                const emptyDiv = document.createElement('div');
                emptyDiv.style.textAlign = 'center';
                emptyDiv.style.color = '#8696a0';
                emptyDiv.style.padding = '20px';
                emptyDiv.textContent = 'Нет сообщений. Будьте первым!';
                messagesContainer.appendChild(emptyDiv);
            } else {
                messages.forEach(msg => {
                    const messageDiv = document.createElement('div');
                    messageDiv.className = `message ${msg.user === currentUser ? 'own' : 'other'} ${msg.encrypted ? 'encrypted' : ''}`;
                    
                    if (msg.type === 'image' && msg.imageData) {
                        // Фото
                        const sender = document.createElement('div');
                        sender.className = 'message-sender';
                        sender.textContent = msg.user;
                        
                        const img = document.createElement('img');
                        img.src = msg.imageData;
                        img.className = 'message-image';
                        img.onclick = (e) => {
                            e.stopPropagation();
                            showFullImage(msg.imageData);
                        };
                        
                        messageDiv.appendChild(sender);
                        messageDiv.appendChild(img);
                        
                        if (msg.caption) {
                            const caption = document.createElement('div');
                            caption.className = 'image-caption';
                            caption.textContent = msg.caption;
                            messageDiv.appendChild(caption);
                        }
                    } else if (msg.type === 'audio' && msg.audioData) {
                        // Аудио
                        const sender = document.createElement('div');
                        sender.className = 'message-sender';
                        sender.textContent = msg.user;
                        
                        const audioContainer = document.createElement('div');
                        audioContainer.className = 'audio-message';
                        
                        const playBtn = document.createElement('button');
                        playBtn.className = 'audio-play-btn';
                        playBtn.textContent = '▶';
                        
                        const audio = new Audio(msg.audioData);
                        let isPlaying = false;
                        
                        playBtn.onclick = (e) => {
                            e.stopPropagation();
                            if (isPlaying) {
                                audio.pause();
                                playBtn.textContent = '▶';
                            } else {
                                audio.play();
                                playBtn.textContent = '⏸';
                            }
                            isPlaying = !isPlaying;
                        };
                        
                        audio.onended = () => {
                            playBtn.textContent = '▶';
                            isPlaying = false;
                        };
                        
                        const wave = document.createElement('div');
                        wave.className = 'audio-wave';
                        
                        const duration = document.createElement('div');
                        duration.className = 'audio-duration';
                        duration.textContent = msg.duration ? `${msg.duration}с` : '0с';
                        
                        audioContainer.appendChild(playBtn);
                        audioContainer.appendChild(wave);
                        audioContainer.appendChild(duration);
                        
                        messageDiv.appendChild(sender);
                        messageDiv.appendChild(audioContainer);
                        
                    } else if (msg.encrypted) {
                        // Сообщение из другой комнаты
                        messageDiv.textContent = msg.text;
                        messageDiv.onclick = () => openDecryptModal(msg);
                    } else {
                        // Текстовое сообщение
                        const sender = document.createElement('div');
                        sender.className = 'message-sender';
                        sender.textContent = msg.user;
                        
                        const text = document.createElement('div');
                        text.textContent = msg.text;
                        
                        messageDiv.appendChild(sender);
                        messageDiv.appendChild(text);
                    }
                    
                    const timeDiv = document.createElement('div');
                    timeDiv.className = 'message-time';
                    timeDiv.textContent = msg.time || '';
                    messageDiv.appendChild(timeDiv);
                    
                    messagesContainer.appendChild(messageDiv);
                });
            }
            
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Показать полноэкранное изображение
        function showFullImage(imageData) {
            const modal = document.createElement('div');
            modal.className = 'decrypt-modal';
            modal.style.backgroundColor = 'rgba(0,0,0,0.95)';
            
            const img = document.createElement('img');
            img.src = imageData;
            img.className = 'modal-image';
            
            const closeBtn = document.createElement('button');
            closeBtn.textContent = 'Закрыть';
            closeBtn.style.position = 'fixed';
            closeBtn.style.bottom = '20px';
            closeBtn.style.left = '50%';
            closeBtn.style.transform = 'translateX(-50%)';
            closeBtn.style.padding = '12px 24px';
            closeBtn.style.backgroundColor = '#00a884';
            closeBtn.style.border = 'none';
            closeBtn.style.borderRadius = '25px';
            closeBtn.style.color = 'white';
            closeBtn.style.cursor = 'pointer';
            
            modal.appendChild(img);
            modal.appendChild(closeBtn);
            
            closeBtn.onclick = () => modal.remove();
            modal.onclick = (e) => {
                if (e.target === modal) modal.remove();
            };
            
            document.body.appendChild(modal);
        }

        // Открыть модальное окно дешифратора
        function openDecryptModal(message) {
            currentEncryptedMessage = message;
            decryptModal.classList.remove('hidden');
            decryptPassword.value = '';
            decryptResult.classList.add('hidden');
            decryptResult.innerHTML = '';
        }

        // Дешифрование в модальном окне
        decryptBtn.addEventListener('click', () => {
            if (!currentEncryptedMessage) return;
            
            const password = decryptPassword.value.trim();
            if (!password) {
                alert('Введите пароль комнаты');
                return;
            }

            const decrypted = decryptMessage(currentEncryptedMessage.encryptedData, password);
            
            decryptResult.classList.remove('hidden');
            
            if (decrypted) {
                if (decrypted.startsWith('data:image')) {
                    decryptResult.innerHTML = `
                        <p style="color:#00a884; margin-bottom:8px;">Отправитель: ${currentEncryptedMessage.originalUser}</p>
                        <img src="${decrypted}" style="max-width:100%; border-radius:8px;">
                        ${currentEncryptedMessage.caption ? `<p style="color:#8696a0; margin-top:8px;">${currentEncryptedMessage.caption}</p>` : ''}
                        <p style="color:#00a884; margin-top:8px;">✓ Сообщение из комнаты</p>
                    `;
                } else if (decrypted.startsWith('data:audio')) {
                    decryptResult.innerHTML = `
                        <p style="color:#00a884; margin-bottom:8px;">Отправитель: ${currentEncryptedMessage.originalUser}</p>
                        <audio controls style="width:100%;">
                            <source src="${decrypted}" type="audio/webm">
                        </audio>
                        ${currentEncryptedMessage.duration ? `<p style="color:#8696a0; margin-top:8px;">Длительность: ${currentEncryptedMessage.duration}с</p>` : ''}
                        <p style="color:#00a884; margin-top:8px;">✓ Сообщение из комнаты</p>
                    `;
                } else {
                    decryptResult.innerHTML = `
                        <p style="color:#00a884; margin-bottom:8px;">Отправитель: ${currentEncryptedMessage.originalUser}</p>
                        <div class="text-message">${decrypted}</div>
                        <p style="color:#00a884; margin-top:8px;">✓ Сообщение из комнаты</p>
                    `;
                }
            } else {
                decryptResult.innerHTML = '<p style="color:#f15c6d;">❌ Неверный пароль комнаты</p>';
            }
        });

        // Закрыть модальное окно
        closeDecryptModal.addEventListener('click', () => {
            decryptModal.classList.add('hidden');
            currentEncryptedMessage = null;
        });

        // Обновление сообщений
        async function refreshMessages() {
            try {
                messages = await loadMessages();
                renderMessages();
            } catch (error) {
                console.error('Ошибка обновления:', error);
            }
        }

        // Вход в комнату
        joinRoomBtn.addEventListener('click', async () => {
            const username = usernameInput.value.trim();
            const password = roomPasswordInput.value.trim();

            if (!username) {
                roomError.textContent = 'Введите ваше имя';
                return;
            }

            if (!password) {
                roomError.textContent = 'Введите пароль комнаты';
                return;
            }

            currentUser = username;
            roomPassword = password;

            joinRoomBtn.disabled = true;
            joinRoomBtn.textContent = 'Вход...';

            try {
                // Загружаем сообщения комнаты
                await refreshMessages();
                
                currentRoomSpan.textContent = `Комната: ${password.substring(0, 3)}...`;
                chatScreen.classList.remove('hidden');
                roomScreen.classList.add('hidden');

                if (pollingInterval) clearInterval(pollingInterval);
                pollingInterval = setInterval(refreshMessages, 3000);

            } catch (error) {
                roomError.textContent = 'Ошибка входа: ' + error.message;
            } finally {
                joinRoomBtn.disabled = false;
                joinRoomBtn.textContent = '🔑 Войти в комнату';
            }
        });

        // Отправка сообщения
        sendBtn.addEventListener('click', async () => {
            const text = messageInput.value.trim();
            
            if (!text && !selectedImage && !selectedAudio) return;

            sendBtn.disabled = true;
            attachBtn.disabled = true;
            voiceBtn.disabled = true;
            messageInput.disabled = true;

            try {
                if (selectedImage) {
                    await sendMessage(text, selectedImage);
                } else {
                    await sendMessage(text);
                }
                
                messageInput.value = '';
                selectedImage = null;
                previewContainer.classList.add('hidden');
                imageUpload.value = '';
                await refreshMessages();
            } catch (error) {
                alert('Ошибка: ' + error.message);
            } finally {
                sendBtn.disabled = false;
                attachBtn.disabled = false;
                voiceBtn.disabled = false;
                messageInput.disabled = false;
                messageInput.focus();
            }
        });

        // Enter для отправки
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendBtn.click();
            }
        });

        // Выход из комнаты
        logoutBtn.addEventListener('click', () => {
            if (pollingInterval) {
                clearInterval(pollingInterval);
                pollingInterval = null;
            }
            chatScreen.classList.add('hidden');
            roomScreen.classList.remove('hidden');
            resetChatState();
        });

        function resetChatState() {
            currentUser = '';
            roomPassword = '';
            messages = [];
            selectedImage = null;
            previewContainer.classList.add('hidden');
            imageUpload.value = '';
            messageInput.value = '';
            
            if (isRecording) {
                stopRecordingBtn.click();
            }
        }

        // Загружаем настройки
        loadSavedSettings();

        // Закрытие модального окна по клику на фон
        decryptModal.addEventListener('click', (e) => {
            if (e.target === decryptModal) {
                decryptModal.classList.add('hidden');
                currentEncryptedMessage = null;
            }
        });
    </script>
</body>
</html>
